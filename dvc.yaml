stages:
  data_ingestion:
    cmd: python -m cnnClassifier.pipeline.stage_01_data_ingestion
    deps:
      - src/cnnClassifier/pipeline/stage_01_data_ingestion.py
      - src/cnnClassifier/components/data_ingestion.py
      - src/cnnClassifier/config/configuration.py
      - src/cnnClassifier/entity/config_entity.py
      - src/cnnClassifier/utils/common.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion/Chest-CT-Scan-data


  prepare_base_model:
    cmd: python -m cnnClassifier.pipeline.stage_02_prepare_base_model
    deps:
      - src/cnnClassifier/pipeline/stage_02_prepare_base_model.py
      - src/cnnClassifier/components/prepare_base_model.py
      - src/cnnClassifier/config/configuration.py
      - src/cnnClassifier/entity/config_entity.py
      - src/cnnClassifier/utils/common.py
      - config/config.yaml
    params:
      - IMAGE_SIZE
      - INCLUDE_TOP
      - CLASSES
      - WEIGHTS
      - LEARNING_RATE
      - RANDOM_SEED
    outs:
      - artifacts/prepare_base_model


  training:
    cmd: python -m cnnClassifier.pipeline.stage_03_model_trainer
    deps:
      - src/cnnClassifier/pipeline/stage_03_model_trainer.py
      - src/cnnClassifier/components/model_trainer.py
      - src/cnnClassifier/config/configuration.py
      - src/cnnClassifier/entity/config_entity.py
      - src/cnnClassifier/utils/common.py
      - config/config.yaml
      - artifacts/data_ingestion/Chest-CT-Scan-data
      - artifacts/prepare_base_model
    params:
      - IMAGE_SIZE
      - EPOCHS
      - BATCH_SIZE
      - AUGMENTATION
      - RANDOM_SEED
    outs:
      - artifacts/training/model.h5


  evaluation:
    cmd: python -m cnnClassifier.pipeline.stage_04_model_evaluation
    deps:
      - src/cnnClassifier/pipeline/stage_04_model_evaluation.py
      - src/cnnClassifier/components/model_evaluation_mlflow.py
      - src/cnnClassifier/config/configuration.py
      - src/cnnClassifier/entity/config_entity.py
      - src/cnnClassifier/utils/common.py
      - config/config.yaml
      - artifacts/data_ingestion/Chest-CT-Scan-data
      - artifacts/training/model.h5
    params:
      - IMAGE_SIZE
      - BATCH_SIZE
    metrics:
    - scores.json:
        cache: false


  lightweight_export:
    cmd: python scripts/train_lightweight_model.py
    deps:
      - scripts/train_lightweight_model.py
      - artifacts/data_ingestion/Chest-CT-Scan-data
    outs:
      - model/lightweight_model.json
